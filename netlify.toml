[build]
  base    = "react-app"
  command = "npm run build"
  publish = "dist"

# Long-lived cache for hashed JS/CSS bundles (Vite adds content hash to filenames)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images for 30 days
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# No cache for HTML (always fresh so new deploys take effect immediately)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# SPA fallback – all routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
